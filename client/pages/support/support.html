<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поддержка | RaceManager ID</title>
  <meta name="description" content="Обращение в поддержку RaceManager.">
  <link rel="icon" type="image/png" href="/public/RaceManagerLogo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260628-6">
  <script src="/script.js?v=20260629-1" defer></script>
</head>
<body class="auth-page support-page">
  <div class="auth-page__background"></div>
  <div class="auth-toast" data-auth-toast role="status" aria-live="polite"></div>
  <header class="auth-header">
    <a class="auth-back" href="/index.html" data-i18n="back">← Вернуться на сайт</a>
    <div class="language-selector">
      <button class="language-selector__button" type="button" aria-expanded="false" aria-haspopup="true">
        <span data-language-flag>🇷🇺</span><strong data-language-label>Русский</strong>
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c3 3 4 6 4 9s-1 6-4 9c-3-3-4-6-4-9s1-6 4-9Z"></path></svg>
      </button>
      <div class="language-selector__menu" hidden>
        <button type="button" data-language="ru" data-flag="🇷🇺"><span>🇷🇺</span> Русский</button>
        <button type="button" data-language="en" data-flag="🇺🇸"><span>🇺🇸</span> English</button>
        <button type="button" data-language="de" data-flag="🇩🇪"><span>🇩🇪</span> Deutsch</button>
        <button type="button" data-language="pl" data-flag="🇵🇱"><span>🇵🇱</span> Polski</button>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-card support-card" aria-labelledby="support-title">
      <a class="auth-brand" href="/index.html" aria-label="RaceManager ID">
        <span class="auth-brand__mark">R</span>
        <span class="auth-brand__name">RACE<span>MANAGER</span></span>
        <b>ID</b>
      </a>
      <h1 id="support-title" data-i18n="supportTitle">Поддержка RaceManager</h1>
      <p class="auth-card__lead" data-i18n="supportLead">Опишите проблему или задайте вопрос. Мы сохраним обращение и свяжемся с вами по указанной почте.</p>

      <div class="auth-note">
        <span class="auth-note__icon">i</span>
        <p data-i18n="supportNote">Укажите как можно больше деталей: страницу, событие, аккаунт и что именно не работает.</p>
        <button type="button" aria-label="Подробнее">⌄</button>
      </div>

      <form class="auth-form support-page-form" action="#" method="post" data-support-form>
        <label class="auth-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 21a8 8 0 0 0-16 0"></path><circle cx="12" cy="7" r="4"></circle></svg>
          <input type="text" name="name" autocomplete="name" required data-i18n-placeholder="supportName" placeholder="Ваше имя">
        </label>
        <label class="auth-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="3"></rect><path d="m4 7 8 6 8-6"></path></svg>
          <input type="email" name="email" autocomplete="email" required data-i18n-placeholder="email" placeholder="Введите email">
        </label>
        <label class="auth-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 6h16M4 12h16M4 18h10"></path></svg>
          <input type="text" name="subject" required data-i18n-placeholder="supportSubject" placeholder="Тема обращения">
        </label>
        <label class="auth-field auth-field--select">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 3 8l9 5 9-5-9-5Z"></path><path d="m3 13 9 5 9-5"></path></svg>
          <select name="category" required>
            <option value="" data-i18n="supportCategory">Выберите категорию</option>
            <option data-i18n="supportCategoryRegistration">Регистрация на событие</option>
            <option data-i18n="supportCategoryAccount">Личный кабинет</option>
            <option data-i18n="supportCategoryResults">Результаты и таблицы</option>
            <option data-i18n="supportCategoryTech">Техническая проблема</option>
          </select>
        </label>
        <label class="auth-field auth-field--textarea">
          <textarea name="message" required></textarea>
        </label>
        <button class="auth-submit" type="submit" data-i18n="supportSubmit">Отправить вопрос</button>
      </form>
    </section>
  </main>
</body>
</html>
