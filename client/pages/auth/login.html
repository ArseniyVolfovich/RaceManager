<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход | RaceManager ID</title>
  <meta name="description" content="Авторизация в личном кабинете RaceManager.">
  <link rel="icon" type="image/png" href="/public/RaceManagerLogo.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css?v=20260628-6">
  <script src="/script.js?v=20260629-1" defer></script>
</head>
<body class="auth-page">
  <div class="auth-page__background"></div>
  <div class="auth-toast" data-auth-toast role="status" aria-live="polite"></div>
  <header class="auth-header">
    <a class="auth-back" href="/index.html" data-i18n="back">← Вернуться на сайт</a>
    <div class="language-selector">
      <button class="language-selector__button" type="button" aria-expanded="false" aria-haspopup="true">
        <span data-language-flag>🇷🇺</span><strong data-language-label>Русский</strong>
        <svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"></circle><path d="M3 12h18M12 3c3 3 4 6 4 9s-1 6-4 9c-3-3-4-6-4-9s1-6 4-9Z"></path></svg>
      </button>
      <div class="language-selector__menu" hidden>
        <button type="button" data-language="ru" data-flag="🇷🇺"><span>🇷🇺</span> Русский</button>
        <button type="button" data-language="en" data-flag="🇺🇸"><span>🇺🇸</span> English</button>
        <button type="button" data-language="de" data-flag="🇩🇪"><span>🇩🇪</span> Deutsch</button>
        <button type="button" data-language="pl" data-flag="🇵🇱"><span>🇵🇱</span> Polski</button>
      </div>
    </div>
  </header>

  <main class="auth-main">
    <section class="auth-card" aria-labelledby="auth-title">
      <a class="auth-brand" href="/index.html" aria-label="RaceManager ID">
        <span class="auth-brand__mark">R</span>
        <span class="auth-brand__name">RACE<span>MANAGER</span></span>
        <b>ID</b>
      </a>
      <h1 id="auth-title" data-i18n="welcome">Добро пожаловать в личный кабинет</h1>
      <p class="auth-card__lead" data-i18n="lead">Войдите в аккаунт или зарегистрируйте новый.</p>

      <div class="auth-note">
        <span class="auth-note__icon">i</span>
        <p data-i18n="note">RaceManager ID — единая система аккаунтов для пилотов, команд и организаторов.</p>
        <button type="button" aria-label="Подробнее">⌄</button>
      </div>

      <form class="auth-form" action="#" method="post">
        <label class="auth-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="3"></rect><path d="m4 7 8 6 8-6"></path></svg>
          <input type="email" name="email" autocomplete="email" required data-i18n-placeholder="email" placeholder="Введите email">
        </label>
        <label class="auth-field">
          <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="5" y="10" width="14" height="10" rx="2"></rect><path d="M8 10V7a4 4 0 0 1 8 0v3"></path></svg>
          <input type="password" name="password" autocomplete="current-password" required data-i18n-placeholder="password" placeholder="Введите пароль">
          <button class="auth-password-toggle" type="button" aria-label="Показать пароль">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12Z"></path><circle cx="12" cy="12" r="2.5"></circle></svg>
          </button>
        </label>
        <label class="auth-remember"><input type="checkbox" name="remember"><span></span><strong data-i18n="remember">Запомнить устройство</strong></label>
        <button class="auth-submit" type="submit" data-i18n="login">Войти</button>
        <p class="auth-message" data-auth-message hidden></p>
        <a class="auth-register" href="/pages/auth/register.html" data-i18n="register">Регистрация</a>
      </form>

      <p class="auth-recovery"><span data-i18n="forgot">Забыли пароль?</span> <a href="#" data-i18n="restore">Восстановить</a></p>
    </section>
  </main>
</body>
</html>
